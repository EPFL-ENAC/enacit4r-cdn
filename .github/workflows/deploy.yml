# https://github.com/EPFL-ENAC/epfl-enac-build-push-deploy-action#readme
name: deploy

'on':
  push:
    branches:
      - develop
      - dev
      - main
      - test
      - stage
    tags: ['v*.*.*']

    
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: EPFL-ENAC/epfl-enac-build-push-deploy-action@main
        with:
          ENAC_IT4R_CD_ORG: "epfl-enac"
          ENAC_IT4R_CD_REPO: "enacit4r-cdn"
          ENAC_IT4R_CD_TOKEN: ${{ secrets.ENAC_IT4R_CD_TOKEN }}